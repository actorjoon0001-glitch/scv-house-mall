<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>메타하우스 관리자</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Inter", "Noto Sans KR", system-ui, sans-serif; background: #12150f; color: #eee; }
    .wrap { max-width: 1180px; margin: 0 auto; padding: 28px 20px 80px; }
    h1 { font-size: 22px; margin: 0 0 4px; }
    .sub { color: #9aa; font-size: 13px; margin: 0 0 20px; }
    .status { display: inline-block; padding: 5px 12px; border-radius: 999px; font-size: 12px; font-weight: 700; margin-left: 8px; }
    .status--sb { background: #1d4634; color: #8fe6b5; }
    .status--local { background: #4a3b1d; color: #f0c674; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { padding: 8px 6px; border-bottom: 1px solid #2a2f26; text-align: left; vertical-align: middle; }
    th { color: #9ab; font-weight: 600; font-size: 12px; white-space: nowrap; }
    tr.is-hidden-row td { opacity: 0.4; }
    input[type="text"], input[type="number"], select {
      width: 100%; padding: 7px 9px; border-radius: 8px; border: 1px solid #3a4136;
      background: #1b1f17; color: #eee; font-size: 13px;
    }
    input:focus, select:focus { outline: none; border-color: #7fd4a8; }
    .num { width: 90px; }
    .btn {
      padding: 10px 20px; border-radius: 999px; border: 0; cursor: pointer;
      font-weight: 700; font-size: 14px; background: #2f5d46; color: #fff;
    }
    .btn:hover { background: #3b7357; }
    .btn--ghost { background: transparent; border: 1px solid #3a4136; color: #ccc; }
    .bar { display: flex; align-items: center; gap: 10px; margin: 18px 0; flex-wrap: wrap; }
    .thumb { width: 52px; height: 40px; object-fit: cover; border-radius: 6px; background: #222; }
    .gate { max-width: 360px; margin: 18vh auto; text-align: center; }
    .gate input { width: 100%; padding: 12px 14px; margin: 14px 0; border-radius: 10px; border: 1px solid #3a4136; background: #1b1f17; color: #eee; font-size: 15px; }
    .gate .err { color: #ff9d9d; font-size: 13px; min-height: 18px; }
    .sqlbox { background: #0d0f0b; border: 1px solid #2a2f26; border-radius: 10px; padding: 14px; font-size: 12px; white-space: pre; overflow-x: auto; color: #9ec7ae; display: none; }
    .note { font-size: 12px; color: #889; margin-top: 6px; }
    .savedmsg { color: #8fe6b5; font-size: 13px; font-weight: 700; }
  </style>
</head>
<body>
  <!-- 로그인 게이트 -->
  <div class="gate" id="gate">
    <h1>메타하우스 관리자</h1>
    <p class="sub">관리자 비밀번호를 입력하세요</p>
    <input type="password" id="gate-pass" placeholder="비밀번호" autocomplete="current-password" />
    <button class="btn" id="gate-btn" style="width:100%">로그인</button>
    <p class="err" id="gate-err"></p>
  </div>

  <!-- 관리자 본문 -->
  <div class="wrap" id="app" hidden>
    <h1>마을 모델 관리 <span class="status" id="store-status"></span></h1>
    <p class="sub">카탈로그 원본은 그대로 두고, 마을·랜딩 <b>표시용 설정</b>만 저장합니다. 저장하면 손님 화면은 새로고침 시 반영됩니다.</p>

    <div class="sqlbox" id="sqlbox"></div>

    <div class="bar">
      <button class="btn" id="save-btn">💾 전체 저장</button>
      <button class="btn btn--ghost" id="reload-btn">↺ 다시 불러오기</button>
      <span class="savedmsg" id="saved-msg"></span>
      <span style="flex:1"></span>
      <a class="btn btn--ghost" href="town.html" target="_blank">3D 마을 미리보기 ↗</a>
    </div>

    <table>
      <thead>
        <tr>
          <th>노출</th><th>사진</th><th>표시 이름</th><th>가격(만원)</th><th>평수</th>
          <th>소속 존</th><th>큐레이터</th><th>특징 설명</th><th>대표 사진 URL</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    <p class="note">· 빈 칸 = 카탈로그 원본 값 사용 · 가격은 만원 단위(예: 6840) · 큐레이터 "자동"은 존 내 순서대로 여/남 교차</p>
  </div>

  <script src="assets/town-config.js"></script>
  <script src="assets/admin.js"></script>
</body>
</html>
